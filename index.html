<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IRON FORTRESS - Missão 20.100</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html,body{
    margin:0;
    padding:0;
    background:#000;
    overflow-x:hidden;
    font-family:Consolas,monospace;
    color:#00ff66;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* ===========================
   CONTAINER
=========================== */

.container{
    width:95%;
    max-width:900px;
    margin:auto;
    padding:15px;

}

/* ===========================
   HEADER
=========================== */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-bottom:18px;
    margin-bottom:25px;
    border-bottom:1px solid rgba(0,255,102,.25);
}

.brand{
    display:flex;
    align-items:center;
    gap:15px;
}

.brand-logo{
    width:54px;
    height:54px;
    border-radius:50%;
    border:2px solid #00ff66;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    font-size:20px;
    color:#00ff66;
    background:rgba(0,0,0,.45);
    box-shadow:0 0 15px rgba(0,255,102,.35);
}

.brand-title{
    font-size:30px;
    font-weight:bold;
    letter-spacing:2px;
}

.brand-subtitle{
    font-size:13px;
    color:#8effc8;
    letter-spacing:1px;
    margin-top:4px;
}

.system-status{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    font-weight:bold;
    color:#8effc8;
}

.status-led{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#00ff66;
    box-shadow:0 0 12px #00ff66;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:.35;}
    100%{opacity:1;}
}

/* ===========================
   DASHBOARD
=========================== */

.dashboard{

display:grid;

grid-template-columns:repeat(3,minmax(140px,1fr));

gap:12px;

margin:20px 0;

align-items:stretch;

}

.card{

background:rgba(0,0,0,.65);

border:1px solid #00ff66;

border-radius:10px;

padding:12px;

text-align:center;

display:flex;

flex-direction:column;

justify-content:center;

min-height:75px;

box-sizing:border-box;

transition:.3s;

}

.card:hover{

box-shadow:0 0 12px #00ff66;

}

.card small{

color:#00ff66;

opacity:.7;

}

.card h3{

margin:6px 0 0;

font-size:18px;

font-weight:bold;

}

/* ===========================
   PROGRESS
=========================== */

.progress{
	position:relative;
    width:100%;
    height:36px;
    background:#111;
    border:1px solid #00ff66;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
    box-shadow:
        0 0 4px #00ff66,
        0 0 10px #00bfff;
}

.progress-fill{
    position:relative;
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00bfff,#00ff66);
    transition:.5s;
}

.progress-text{

    position:absolute;

    top:50%;

    left:50%;

    transform:translate(-50%,-50%);

    color:#fff;

    font-weight:bold;

    font-size:14px;

    text-shadow:0 0 8px #000;

    pointer-events:none;

}

/* ===========================
   GRID
=========================== */

.grid{
    display:grid;
    grid-template-columns:repeat(20, 42px);
    justify-content:center;
    gap:10px;
    margin:40px auto 20px;
}

.item{
    width:50px;
    height:50px;
	font-size:13px;
    border-radius:50%;
    border:2px solid #00ff66;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.6);
    cursor:pointer;
    transition:.25s ease;
    font-weight:bold;
    color:#00ff66;
    box-sizing:border-box;
}

.item:hover{
    transform:scale(1.12);
    box-shadow:0 0 15px #00ff66;
}

.pago{
    background:linear-gradient(135deg,#00bfff,#00ff66);
    color:#000;
    border:none;
    box-shadow:0 0 15px #00ff66;
}

button{
    margin-top:20px;
    padding:10px 20px;
    background:#111;
    color:#00ff66;
    border:1px solid #00ff66;
    cursor:pointer;
}

/* ===========================
   RESPONSIVO
=========================== */

@media (max-width:768px){

    .dashboard{
        grid-template-columns:repeat(3,1fr);
        gap:8px;
    }

    .card{
        padding:8px;
        min-height:60px;
    }

    .card small{
        font-size:9px;
    }

    .card h3{
        font-size:13px;
        margin-top:4px;
    }

    .grid{
        grid-template-columns:repeat(5,42px);
        justify-content:center;
        gap:10px;
    }

    .item{
        width:42px;
        height:42px;
        font-size:12px;
    }

    .info{
        margin:10px;
    }

}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="header">

    <div class="brand">

        <div class="brand-logo">
            IF
        </div>

        <div>

            <div class="brand-title">
                IRON FORTRESS
            </div>

            <div class="brand-subtitle">
                Financial Command Center
            </div>

        </div>

    </div>

    <div class="system-status">

        <span class="status-led"></span>

        <span>ONLINE</span>

    </div>

</div>

<div class="info">

<h2>MISSÃO R$ 20.100</h2>

<div class="dashboard">

    <div class="card">
        <small>MISSÕES</small>
        <h3 id="missoes"></h3>
    </div>

    <div class="card">
        <small>ACUMULADO</small>
        <h3 id="valor"></h3>
    </div>

    <div class="card">
        <small>FALTAM</small>
        <h3 id="faltam"></h3>
    </div>

</div>

<div class="progress">

    <div class="progress-fill" id="progressFill"></div>

    <div class="progress-text" id="percentual">
        0%
    </div>

</div>
	
</div>

<div class="grid" id="grid"></div>

<button onclick="resetar()">Resetar Missão</button>

</div>

<script>

let pagos = JSON.parse(localStorage.getItem("ironfortress")) || [];

const grid=document.getElementById("grid");

for(let i=1;i<=200;i++){

let d=document.createElement("div");

d.className="item";

if(pagos.includes(i)) d.classList.add("pago");

d.innerHTML=i;

d.onclick=()=>{

if(pagos.includes(i)){

pagos=pagos.filter(x=>x!=i);

d.classList.remove("pago");

}else{

pagos.push(i);

d.classList.add("pago");

}

localStorage.setItem("ironfortress",JSON.stringify(pagos));

atualizar();

}

grid.appendChild(d);

}

function atualizar(){

let total=pagos.reduce((a,b)=>a+b,0);

document.getElementById("valor").innerHTML="💰 Acumulado: R$ "+total.toLocaleString('pt-BR');

document.getElementById("faltam").innerHTML="🎯 Faltam: R$ "+(20100-total).toLocaleString('pt-BR');

document.getElementById("missoes").innerHTML="✅ Missões: "+pagos.length+"/200";

let percentual=((total/20100)*100).toFixed(1);

document.getElementById("progressFill").style.width=percentual+"%";

document.getElementById("percentual").innerHTML=percentual+"%";

}

function resetar(){

if(confirm("Apagar todo o progresso?")){

localStorage.removeItem("ironfortress");

location.reload();

}

}

atualizar();


// MATRIX

const canvas=document.getElementById("matrix");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

const letters="アイウエオカキクケコ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const font=14;

const columns=canvas.width/font;

const drops=[];

for(let i=0;i<columns;i++) drops[i]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,.05)";

ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff66";

ctx.font=font+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*font,drops[i]*font);

if(drops[i]*font>canvas.height && Math.random()>0.975){

drops[i]=0;

}

drops[i]++;

}

}

setInterval(draw,45);

</script>

</body>
</html>
